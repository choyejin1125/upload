<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style>
    /* 1. 화면 전체를 사용하여 폼을 정중앙에 배치 */
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f2f5;
        font-family: 'Malgun Gothic', sans-serif;
    }

    /* 2. 전체를 감싸는 가장 바깥 div (컨테이너) */
    body > div {
        width: 320px;
        background-color: white;
        border: 2px solid #333; /* 이미지처럼 진한 테두리 */
        text-align: center;
        box-shadow: 5px 5px 15px rgba(0,0,0,0.1); /* 약간의 그림자 */
    }

    /* 3. '단위변환' 제목 부분 */
    body > div > div:first-child {
        font-size: 22px;
        font-weight: bold;
        padding: 15px;
        border-bottom: 2px solid #333;
    }

    /* 4. form 내부 영역 (하늘색 배경) */
    form {
        background-color: #cceeff; /* 하늘색 톤 배경 */
        padding: 30px 20px;
        margin: 0;
    }

    /* 5. 입력 그룹 간격 ('변환할 값' 묶음과 '단위' 묶음 사이) */
    form > div {
        margin-bottom: 25px;
    }

    /* 6. '변환할 값', '단위' 라벨 (파란색 박스) */
    form > div > div:first-child {
        background-color: #66b3ff;
        color: white;
        width: 120px;
        margin: 0 auto 10px auto; /* 가운데 정렬 및 아래 여백 */
        padding: 8px;
        font-weight: bold;
    }

    /* 7. 입력창(input)과 드롭다운(select) 박스 */
    input, select {
        width: 80%;
        padding: 10px;
        border: 1px solid #ccc;
        text-align: center;
        font-size: 15px;
        box-sizing: border-box; /* 패딩이 너비에 포함되도록 설정 */
    }

    /* 8. '숫자만 입력하세요.' 경고문 */
    span {
        display: block;
        color: #ff4d4d; /* 빨간색 */
        font-size: 12px;
        text-align: right;
        margin-top: 5px;
        padding-right: 10%; /* 오른쪽 여백을 주어 인풋박스와 끝 선을 맞춤 */
    }

    /* 9. 단위 변환 버튼 */
    button {
        width: 80%;
        padding: 12px;
        background-color: #66b3ff;
        color: white;
        border: none;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    /* 버튼에 마우스를 올렸을 때 색상 변화 */
    button:hover {
        background-color: #3399ff;
    }
</style>


</head>
<body>

<div>
	<div>단위변환</div>
	
	<form action="result.jsp" onsubmit="return checkInput()">
	
		<div>
			<div>변환할 값</div>
			<input name = "inputValue" id="inputValue">
			<span>숫자만 입력하세요.</span>
		</div>
	
		<div>
			<div>단위</div>
			<select name = "unitType">
				<option value="">단위를 선택 하세요.</option>
				<option value="length">cm -> inch</option>
				<option value="area">㎡ -> 평</option>
				<option value="temperature">℃ -> ℉</option>
				<option value="speed">km/h -> mi/h</option>
			</select>
		</div>	
		
		<button>단위 변환</button>
		
		</form>
		
		<script type="text/javascript">
	    function checkInput() {
	        // 1. id가 'inputValue'인 입력창의 값을 가져옵니다.
	        let val = document.getElementById("inputValue").value;
	
	        // 2. 값이 비어있는지 확인합니다. (trim()은 양옆 공백을 제거해줍니다)
	        if (val.trim() === "") {
	            alert("변환할 값을 입력해주세요!"); // 경고창 띄우기
	            document.getElementById("inputValue").focus(); // 입력창에 다시 커서 깜빡이게 하기
	            
	            return false; // 🌟 핵심: false를 반환하면 action에 적힌 페이지로 넘어가지 않습니다!
	        }
	
	        // 3. 값이 잘 들어있다면 true를 반환하여 정상적으로 폼을 전송합니다.
	        return true; 
	    }
		</script>
		
		
	</div>
		

	
</body>
</html>
